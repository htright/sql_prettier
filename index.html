<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Prettier Tool - Company Standard</title>
    <meta name="description" content="ver1.0.1" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="sql_prettier_htjung" />
    <meta property="og:title" content="sql_prettier_htjung" />
    <meta property="og:description" content="ver1.0.1" />
    <meta
      property="og:url"
      content="https://htright.github.io/sql_prettier/"
    />
    <meta
      property="og:image"
      content="https://htright.github.io/sql_prettier/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="sql_prettier_htjung" />
    <meta name="twitter:description" content="ver1.0.1" />
    <meta
      name="twitter:image"
      content="https://htright.github.io/sql_prettier/og-image.png"
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f6fb;
        --bg-elevated: #ffffff;
        --panel: #ffffff;
        --panel-soft: #f8fafc;
        --line: #e2e8f0;
        --line-strong: #cbd5e1;
        --text: #0f172a;
        --text-soft: #334155;
        --muted: #64748b;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --accent-soft: #dbeafe;
        --accent-text: #1e3a8a;
        --code: #0f172a;
        --shadow: 0 1px 2px rgba(15, 23, 42, 0.04),
          0 8px 24px rgba(15, 23, 42, 0.06);
        --ring: 0 0 0 3px rgba(37, 99, 235, 0.18);
        --gradient-title: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #0a0e1a;
        --bg-elevated: #111726;
        --panel: #131a2b;
        --panel-soft: #1a2236;
        --line: #232c44;
        --line-strong: #34405d;
        --text: #e6ecf5;
        --text-soft: #c3cbdb;
        --muted: #8794ad;
        --accent: #5b8dff;
        --accent-hover: #7ba3ff;
        --accent-soft: #1e2a4d;
        --accent-text: #b3c7ff;
        --code: #e6ecf5;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.3),
          0 8px 24px rgba(0, 0, 0, 0.35);
        --ring: 0 0 0 3px rgba(91, 141, 255, 0.28);
        --gradient-title: linear-gradient(135deg, #7ba3ff 0%, #a78bfa 100%);
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          color-scheme: dark;
          --bg: #0a0e1a;
          --bg-elevated: #111726;
          --panel: #131a2b;
          --panel-soft: #1a2236;
          --line: #232c44;
          --line-strong: #34405d;
          --text: #e6ecf5;
          --text-soft: #c3cbdb;
          --muted: #8794ad;
          --accent: #5b8dff;
          --accent-hover: #7ba3ff;
          --accent-soft: #1e2a4d;
          --accent-text: #b3c7ff;
          --code: #e6ecf5;
          --shadow: 0 1px 2px rgba(0, 0, 0, 0.3),
            0 8px 24px rgba(0, 0, 0, 0.35);
          --ring: 0 0 0 3px rgba(91, 141, 255, 0.28);
          --gradient-title: linear-gradient(135deg, #7ba3ff 0%, #a78bfa 100%);
        }
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard,
          "Apple SD Gothic Neo", "Malgun Gothic", Roboto, "Helvetica Neue",
          Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.2s ease, color 0.2s ease;
      }
      .wrap {
        max-width: 1520px;
        margin: 0 auto;
        padding: 28px 24px 48px;
      }
      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .title h1 {
        margin: 0 0 6px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: var(--gradient-title);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }
      .title p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-text);
        font-size: 12px;
        font-weight: 600;
        margin-top: 10px;
      }

      .theme-toggle {
        display: inline-flex;
        padding: 4px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: var(--shadow);
        gap: 2px;
      }
      .theme-toggle button {
        appearance: none;
        border: 0;
        background: transparent;
        padding: 7px 12px;
        border-radius: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: background-color 0.15s ease, color 0.15s ease;
      }
      .theme-toggle button:hover {
        color: var(--text);
      }
      .theme-toggle button[aria-pressed="true"] {
        background: var(--accent-soft);
        color: var(--accent-text);
      }
      .theme-toggle svg {
        width: 14px;
        height: 14px;
      }

      .layout {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 16px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        box-shadow: var(--shadow);
        transition: background-color 0.2s ease, border-color 0.2s ease;
      }
      .card h2 {
        margin: 0 0 14px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .rule-group {
        display: grid;
        gap: 14px;
      }
      .field {
        display: grid;
        gap: 6px;
      }
      .field label {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      input[type="number"],
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        background: var(--bg-elevated);
        color: var(--text);
        transition: border-color 0.15s ease, box-shadow 0.15s ease,
          background-color 0.2s ease;
      }
      input[type="number"]:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: var(--ring);
      }
      select {
        appearance: none;
        background-image: linear-gradient(
            45deg,
            transparent 50%,
            var(--muted) 50%
          ),
          linear-gradient(135deg, var(--muted) 50%, transparent 50%);
        background-position:
          calc(100% - 18px) 50%,
          calc(100% - 13px) 50%;
        background-size:
          5px 5px,
          5px 5px;
        background-repeat: no-repeat;
        padding-right: 32px;
      }
      textarea {
        min-height: 640px;
        resize: vertical;
        font-family: "JetBrains Mono", "Cascadia Code", Consolas, "SF Mono",
          Menlo, monospace;
        font-size: 13px;
        line-height: 1.45;
        color: var(--code);
        tab-size: 4;
        white-space: pre;
        background: var(--panel-soft);
      }
      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }
      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.15s ease, color 0.15s ease,
          transform 0.05s ease, box-shadow 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      button:active {
        transform: translateY(1px);
      }
      button:focus-visible {
        outline: none;
        box-shadow: var(--ring);
      }
      .primary {
        background: var(--accent);
        color: #ffffff;
      }
      .primary:hover {
        background: var(--accent-hover);
      }
      .secondary {
        background: var(--accent-soft);
        color: var(--accent-text);
      }
      .secondary:hover {
        filter: brightness(1.05);
      }
      .ghost {
        background: var(--panel-soft);
        color: var(--text-soft);
        border: 1px solid var(--line);
      }
      .ghost:hover {
        background: var(--bg-elevated);
        color: var(--text);
      }
      .editor-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .editor-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        gap: 8px;
        min-height: 36px;
      }
      .editor-head strong {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .note {
        margin-top: 14px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }
      .status {
        margin-top: 14px;
        padding: 10px 12px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        border-radius: 10px;
        font-size: 12px;
        color: var(--muted);
        min-height: 42px;
        white-space: pre-wrap;
        font-family: "JetBrains Mono", Consolas, monospace;
      }
      ::placeholder {
        color: var(--muted);
        opacity: 0.65;
      }
      textarea::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      textarea::-webkit-scrollbar-thumb {
        background: var(--line-strong);
        border-radius: 8px;
        border: 2px solid var(--panel-soft);
      }
      textarea::-webkit-scrollbar-track {
        background: transparent;
      }

      .code-editor {
        display: flex;
        align-items: stretch;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        height: 640px;
        max-height: calc(100vh - 220px);
        min-height: 360px;
        resize: vertical;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .code-editor:focus-within {
        border-color: var(--accent);
        box-shadow: var(--ring);
      }
      .code-gutter {
        flex: 0 0 auto;
        padding: 10px 10px 10px 14px;
        font-family: "JetBrains Mono", "Cascadia Code", Consolas, "SF Mono",
          Menlo, monospace;
        font-size: 13px;
        line-height: 1.45;
        text-align: right;
        color: var(--muted);
        background: var(--panel-soft);
        border-right: 1px solid var(--line);
        white-space: pre;
        user-select: none;
        overflow-y: scroll;
        scrollbar-width: none;
        min-width: 48px;
        opacity: 0.75;
      }
      .code-gutter::-webkit-scrollbar {
        display: none;
      }
      .code-gutter .gn-line {
        display: block;
        line-height: inherit;
        padding: 0 6px;
        border-radius: 3px;
      }
      .code-gutter.clickable .gn-line {
        cursor: pointer;
        transition: color 0.1s ease, background-color 0.1s ease;
      }
      .code-gutter.clickable .gn-line:hover {
        background: var(--accent-soft);
        color: var(--accent-text);
        opacity: 1;
      }
      .code-gutter.clickable .gn-line.active {
        background: var(--accent);
        color: #fff;
        opacity: 1;
      }
      .code-editor textarea {
        flex: 1 1 auto;
        border: 0;
        border-radius: 0;
        background: transparent;
        min-height: 0;
        height: auto;
        resize: none;
        overflow: auto;
      }
      .code-editor textarea:focus {
        box-shadow: none;
        border-color: transparent;
      }

      .diff-card {
        margin-top: 16px;
      }
      .diff-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .diff-head strong {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .diff-summary {
        font-family: "JetBrains Mono", Consolas, monospace;
        font-size: 12px;
        color: var(--muted);
      }
      .diff-summary .add-count {
        color: #16a34a;
        font-weight: 700;
      }
      .diff-summary .rem-count {
        color: #dc2626;
        font-weight: 700;
        margin-left: 10px;
      }
      .diff-view {
        margin: 0;
        padding: 6px 0;
        font-family: "JetBrains Mono", "Cascadia Code", Consolas, "SF Mono",
          Menlo, monospace;
        font-size: 12.5px;
        line-height: 1.55;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        border-radius: 10px;
        max-height: 560px;
        overflow: auto;
      }
      .diff-line {
        display: grid;
        grid-template-columns: 48px 48px 1fr;
        border-left: 3px solid transparent;
      }
      .diff-gn {
        text-align: right;
        padding: 0 8px;
        color: var(--muted);
        opacity: 0.55;
        user-select: none;
        font-size: 11.5px;
        line-height: inherit;
      }
      .diff-text {
        white-space: pre;
        padding: 0 8px;
        overflow: hidden;
        text-overflow: clip;
      }
      .diff-line.equal {
        color: var(--text-soft);
        opacity: 0.78;
      }
      .diff-line.add {
        background: rgba(34, 197, 94, 0.13);
        border-left-color: #22c55e;
        color: #15803d;
      }
      .diff-line.remove {
        background: rgba(239, 68, 68, 0.13);
        border-left-color: #ef4444;
        color: #b91c1c;
      }
      .diff-empty {
        padding: 18px;
        text-align: center;
        color: var(--muted);
        font-size: 13px;
      }
      :root[data-theme="dark"] .diff-line.add {
        background: rgba(34, 197, 94, 0.15);
        color: #86efac;
      }
      :root[data-theme="dark"] .diff-line.remove {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) .diff-line.add {
          background: rgba(34, 197, 94, 0.15);
          color: #86efac;
        }
        :root:not([data-theme="light"]) .diff-line.remove {
          background: rgba(239, 68, 68, 0.15);
          color: #fca5a5;
        }
      }

      .top-btn {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 0;
        background: var(--accent);
        color: #ffffff;
        box-shadow: var(--shadow);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
        transition: opacity 0.2s ease, transform 0.2s ease,
          background-color 0.15s ease;
        z-index: 1000;
      }
      .top-btn.visible {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }
      .top-btn:hover {
        background: var(--accent-hover);
      }
      .top-btn:focus-visible {
        outline: none;
        box-shadow: var(--ring);
      }
      .top-btn svg {
        width: 18px;
        height: 18px;
      }

      @media (max-width: 1080px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .editor-grid {
          grid-template-columns: 1fr;
        }
        textarea {
          min-height: 380px;
        }
        .code-editor {
          height: 420px;
          max-height: calc(100vh - 180px);
        }
      }
    </style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme-preference");
          if (stored === "light" || stored === "dark") {
            document.documentElement.setAttribute("data-theme", stored);
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="title">
          <h1>sql_prettier_htjung</h1>
          <p>ver1.0.1</p>
          <div class="badge">test</div>
        </div>
        <div
          class="theme-toggle"
          role="group"
          aria-label="테마 선택"
          id="themeToggle"
        >
          <button type="button" data-theme-value="light" aria-pressed="false">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="4" />
              <path
                d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
              />
            </svg>
            Light
          </button>
          <button type="button" data-theme-value="dark" aria-pressed="false">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            Dark
          </button>
          <button type="button" data-theme-value="system" aria-pressed="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <rect x="2" y="3" width="20" height="14" rx="2" />
              <path d="M8 21h8M12 17v4" />
            </svg>
            System
          </button>
        </div>
      </div>

      <div class="layout">
        <aside class="card">
          <h2>포맷 규칙</h2>
          <div class="rule-group">
            <div class="field">
              <label for="indentSize">들여쓰기 칸 수</label>
              <input id="indentSize" type="number" min="1" max="8" value="2" />
            </div>

            <div class="field">
              <label for="keywordCase">키워드 대소문자</label>
              <select id="keywordCase">
                <option value="upper" selected>UPPER</option>
                <option value="lower">lower</option>
              </select>
            </div>
            <!-- 테스트스윕으로 옵션 선택이 의미가 없어보임
          <label class="check"><input id="alignDeclare" type="checkbox" checked /> DECLARE 변수 정렬</label>
          <label class="check"><input id="alignProcParams" type="checkbox" checked /> PROC 파라미터 정렬</label>
          <label class="check"><input id="alignSelectList" type="checkbox" checked /> SELECT 별칭 정렬</label>
          <label class="check"><input id="alignSetClause" type="checkbox" checked /> SET 절 정렬</label>
          <label class="check"><input id="breakBeforeComma" type="checkbox" checked /> 쉼표를 줄 앞에 배치</label>
          <label class="check"><input id="newlineBeforeJoin" type="checkbox" checked /> JOIN 전 줄바꿈</label>
          <label class="check"><input id="newlineBeforeAnd" type="checkbox" checked /> AND / OR 전 줄바꿈</label>
          <label class="check"><input id="spaceAroundOperator" type="checkbox" checked /> 연산자 주변 공백 정리</label> -->
          </div>

          <div class="button-row">
            <button class="primary" id="formatBtn">포맷 실행</button>
            <!-- <button class="secondary" id="sampleBtn">예제 넣기</button> -->
            <button class="ghost" id="resetBtn">초기화</button>
          </div>

          <div class="note">
            test
            <!-- 기준 스타일
          <br>1. JOIN + ON 한 줄 유지
          <br>2. ON 아래 AND는 ON 시작 위치 정렬
          <br>3. WHERE 아래 AND는 두 칸 들여쓰기
          <br>4. SELECT 컬럼은 쉼표 앞 정렬 + AS 별칭 정렬
          <br>5. PROC/DECLARE/EXEC는 세로 정렬 -->
          </div>

          <div class="status" id="status">준비됨</div>
        </aside>

        <section class="card">
          <div class="editor-grid">
            <div>
              <div class="editor-head">
                <strong>입력 SQL</strong>
                <!-- <button class="ghost" id="pasteSampleMessy">프로시저 예제</button> -->
                <div><br /><br /></div>
              </div>
              <div class="code-editor">
                <div
                  class="code-gutter"
                  id="inputGutter"
                  aria-hidden="true"
                >1</div>
                <textarea
                  id="inputSql"
                  spellcheck="false"
                  placeholder="여기에 SQL을 붙여넣으세요."
                ></textarea>
              </div>
            </div>

            <div>
              <div class="editor-head">
                <strong>포맷 결과</strong>
                <div class="button-row" style="margin: 0">
                  <button class="secondary" id="copyBtn">복사</button>
                  <button class="ghost" id="swapBtn">결과를 입력으로</button>
                </div>
              </div>
              <div class="code-editor">
                <div
                  class="code-gutter"
                  id="outputGutter"
                  aria-hidden="true"
                >1</div>
                <textarea
                  id="outputSql"
                  spellcheck="false"
                  placeholder="포맷 결과가 여기에 표시됩니다."
                ></textarea>
              </div>
            </div>
          </div>
        </section>
      </div>

      <section class="card diff-card" id="diffCard" hidden>
        <div class="diff-head">
          <strong>변경 사항 (입력 vs 결과)</strong>
          <span class="diff-summary" id="diffSummary"></span>
        </div>
        <div class="diff-view" id="diffView"></div>
      </section>
    </div>

    <button
      id="topBtn"
      class="top-btn"
      type="button"
      aria-label="맨 위로"
      title="맨 위로"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M12 19V5M5 12l7-7 7 7" />
      </svg>
    </button>

    <script>
      const el = (id) => document.getElementById(id);

      const KEYWORDS = [
        "CREATE PROCEDURE",
        "ALTER PROCEDURE",
        "CREATE PROC",
        "ALTER PROC",
        "PROCEDURE",
        "PROC",
        "LEFT OUTER JOIN",
        "RIGHT OUTER JOIN",
        "FULL OUTER JOIN",
        "INNER JOIN",
        "LEFT JOIN",
        "RIGHT JOIN",
        "FULL JOIN",
        "CROSS JOIN",
        "OUTER APPLY",
        "CROSS APPLY",
        "GROUP BY",
        "ORDER BY",
        "PARTITION BY",
        "UNION ALL",
        "NOT EXISTS",
        "NOT IN",
        "IS NOT NULL",
        "IS NULL",
        "INSERT INTO",
        "DELETE FROM",
        "BEGIN TRY",
        "END TRY",
        "BEGIN CATCH",
        "END CATCH",
        "SELECT",
        "FROM",
        "WHERE",
        "HAVING",
        "JOIN",
        "ON",
        "AND",
        "OR",
        "INSERT",
        "INTO",
        "VALUES",
        "UPDATE",
        "SET",
        "DELETE",
        "DECLARE",
        "BEGIN",
        "END",
        "IF",
        "ELSE",
        "RETURN",
        "EXECUTE",
        "EXEC",
        "CASE",
        "WHEN",
        "THEN",
        "DISTINCT",
        "TOP",
        "AS",
        "WITH",
        "NOLOCK",
        "OUTPUT",
        "OVER",
        "EXISTS",
        "IN",
        "UNION",
        "WHILE",
        "DROP",
        "CREATE",
        "ALTER",
      ];

      const MAIN_CLAUSES = [
        // statement-level (길이가 긴 매치를 먼저 적용)
        "CREATE CLUSTERED INDEX",
        "CREATE NONCLUSTERED INDEX",
        "CREATE UNIQUE INDEX",
        "CREATE INDEX",
        "CREATE TABLE",
        "ALTER TABLE",
        "DROP TABLE",
        "TRUNCATE TABLE",
        "INSERT INTO",
        "DELETE FROM",
        "DELETE",
        "UPDATE",
        "MERGE INTO",
        "DECLARE",
        "EXECUTE",
        "EXEC",
        "PRINT",
        "RETURN",
        "BEGIN TRAN",
        "BEGIN TRY",
        "BEGIN CATCH",
        "END TRY",
        "END CATCH",
        "BEGIN",
        "END",
        "WHILE",
        "IF",
        // clause-level
        "SELECT",
        "FROM",
        "WHERE",
        "GROUP BY",
        "ORDER BY",
        "HAVING",
        "VALUES",
        "SET",
      ];

      const JOIN_REGEX =
        /(LEFT\s+OUTER\s+JOIN|RIGHT\s+OUTER\s+JOIN|FULL\s+OUTER\s+JOIN|INNER\s+JOIN|LEFT\s+JOIN|RIGHT\s+JOIN|FULL\s+JOIN|CROSS\s+JOIN|JOIN|OUTER\s+APPLY|CROSS\s+APPLY)/gi;
      const CLAUSE_START_REGEX =
        /^(WITH|SELECT|FROM|WHERE|GROUP BY|ORDER BY|HAVING|SET|VALUES|INSERT INTO|UPDATE|DELETE FROM|DELETE|DECLARE|IF|ELSE|WHILE|BEGIN|END|RETURN|EXEC|EXECUTE|CREATE|ALTER|DROP|TRUNCATE|LEFT OUTER JOIN|RIGHT OUTER JOIN|FULL OUTER JOIN|INNER JOIN|LEFT JOIN|RIGHT JOIN|FULL JOIN|CROSS JOIN|JOIN|OUTER APPLY|CROSS APPLY|ON|AND|OR)\b/i;

      function escapeRegExp(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function keywordTransform(word, mode) {
        return mode === "lower" ? word.toLowerCase() : word.toUpperCase();
      }

      function normalizeLineBreaks(sql) {
        return sql.replace(/\r\n?/g, "\n");
      }

      function protectSegments(sql) {
        const store = [];
        // 라인 주석은 뒤따라오는 \n까지 같이 캡처해야 라인 중간 복원 시
        // 다음 코드를 주석으로 먹어버리는 사고를 막을 수 있다.
        const patterns = [
          /\/\*[\s\S]*?\*\//g,
          /--[^\n]*\n?/g,
          /\[[^\]\n]+\]/g,
          /N?'(?:''|[^'])*'/g,
        ];

        let result = sql;
        patterns.forEach((pattern) => {
          result = result.replace(pattern, (match) => {
            const token = `__PROTECTED_${store.length}__`;
            store.push(match);
            return token;
          });
        });
        return { result, store };
      }

      function restoreSegments(sql, store) {
        // 늦게 매치된 패턴이 먼저 만들어진 토큰을 포함하는 경우가 있어
        // (예: 라인 주석 안의 [...] 또는 문자열 안의 [...]) 역순으로 복원해야
        // 바깥쪽을 풀어낸 뒤 노출된 안쪽 토큰까지 같은 패스에서 처리된다.
        let result = sql;
        for (let i = store.length - 1; i >= 0; i--) {
          result = result.replaceAll(`__PROTECTED_${i}__`, store[i]);
        }
        // 만약을 위한 안전망: 남은 토큰이 있으면 한 번 더 시도
        if (result.includes("__PROTECTED_")) {
          for (let i = store.length - 1; i >= 0; i--) {
            result = result.replaceAll(`__PROTECTED_${i}__`, store[i]);
          }
        }
        return result;
      }

      function applyKeywordCase(sql, mode) {
        const sorted = [...KEYWORDS].sort((a, b) => b.length - a.length);
        let result = sql;

        for (const kw of sorted) {
          const pattern = new RegExp(
            `\\b${escapeRegExp(kw).replace(/ /g, "\\s+")}\\b`,
            "gi",
          );
          result = result.replace(pattern, keywordTransform(kw, mode));
        }

        return result;
      }

      function collapseSpaces(sql) {
        return sql
          .replace(/[ \t]+/g, " ")
          .replace(/ +\n/g, "\n")
          .replace(/\n +/g, "\n")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function normalizeMissingKeywordSpaces(sql) {
        const keywordLookahead = [
          "AND",
          "OR",
          "WHERE",
          "HAVING",
          "GROUP\\s+BY",
          "ORDER\\s+BY",
          "FROM",
          "SELECT",
          "LEFT\\s+OUTER\\s+JOIN",
          "RIGHT\\s+OUTER\\s+JOIN",
          "FULL\\s+OUTER\\s+JOIN",
          "INNER\\s+JOIN",
          "LEFT\\s+JOIN",
          "RIGHT\\s+JOIN",
          "FULL\\s+JOIN",
          "CROSS\\s+JOIN",
          "JOIN",
          "OUTER\\s+APPLY",
          "CROSS\\s+APPLY",
        ].join("|");

        let result = sql;

        // 문자열/주석/대괄호 식별자 보호 토큰 뒤에 키워드가 바로 붙은 경우
        result = result.replace(
          new RegExp(`(__PROTECTED_\\d+__)(?=(${keywordLookahead})\\b)`, "gi"),
          "$1 ",
        );

        // 닫는 괄호 뒤에 키워드가 바로 붙은 경우: )AND, )ORDER BY
        result = result.replace(
          new RegExp(`(\\))(?=(${keywordLookahead})\\b)`, "gi"),
          "$1 ",
        );

        // 숫자 리터럴 뒤에 키워드가 바로 붙은 경우만 보정
        // Col1AND, @P1AND 같은 식별자/변수명은 깨지지 않도록 숫자 앞 경계를 확인한다.
        const numericLiteral = "(^|[^A-Za-z0-9_@#\\]\\.])(\\d+(?:\\.\\d+)?)";
        result = result.replace(
          new RegExp(`${numericLiteral}(?=(${keywordLookahead})\\b)`, "gi"),
          "$1$2 ",
        );

        return result;
      }

      function normalizeOperators(sql) {
        let result = sql;

        const binaryPatterns = [
          { regex: /(\S)[ \t]*(<>|!=|>=|<=|=)[ \t]*(\S)/g, repl: "$1 $2 $3" },
          { regex: /([\w\]\)])[ \t]*(\+)[ \t]*([\w@#\[(])/g, repl: "$1 $2 $3" },
          { regex: /([\w\]\)])[ \t]*(\/)[ \t]*([\w@#\[(])/g, repl: "$1 $2 $3" },
          { regex: /([\w\]\)])[ \t]*(\*)[ \t]*([\w@#\[(])/g, repl: "$1 $2 $3" },
          { regex: /([\w\]\)])[ \t]*(-)[ \t]*([\w@#\[(])/g, repl: "$1 $2 $3" },
        ];

        binaryPatterns.forEach(({ regex, repl }) => {
          result = result.replace(regex, repl);
        });

        return result
          .replace(/\(\s+/g, "(")
          .replace(/\s+\)/g, ")")
          .replace(/[ \t]+,/g, ",");
      }

      function protectJoinPhrases(sql) {
        const joins = [];
        const result = sql.replace(JOIN_REGEX, (match) => {
          const token = `__JOIN_${joins.length}__`;
          joins.push(match);
          return token;
        });
        return { result, joins };
      }

      function restoreJoinPhrases(sql, joins, mode) {
        let result = sql;
        joins.forEach((value, idx) => {
          result = result.replaceAll(
            `__JOIN_${idx}__`,
            keywordTransform(value.toUpperCase(), mode),
          );
        });
        return result;
      }

      function protectBetweenAnd(sql, options) {
        const betweenAnds = [];
        const valuePattern =
          "(?:__PROTECTED_\\d+__|@[A-Za-z0-9_#]+|#[A-Za-z0-9_#]+|[A-Za-z0-9_\\.\\[\\]]+|\\([^)]*\\))";
        const pattern = new RegExp(
          `\\bBETWEEN\\s+(${valuePattern})\\s+AND\\s+(${valuePattern})`,
          "gi",
        );

        const result = sql.replace(pattern, (match) => {
          const token = `__BETWEEN_AND_${betweenAnds.length}__`;
          betweenAnds.push(keywordTransform("AND", options.keywordCase));
          return match.replace(/\s+AND\s+/i, ` ${token} `);
        });

        return { result, betweenAnds };
      }

      function restoreBetweenAnd(sql, betweenAnds) {
        let result = sql;
        betweenAnds.forEach((value, idx) => {
          result = result.replaceAll(`__BETWEEN_AND_${idx}__`, value);
        });
        return result;
      }

      function splitTopLevel(text, delimiter = ",") {
        const chunks = [];
        let current = "";
        let depth = 0;

        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          if (ch === "(") depth += 1;
          else if (ch === ")") depth = Math.max(0, depth - 1);

          if (ch === delimiter && depth === 0) {
            chunks.push(current.trim());
            current = "";
          } else {
            current += ch;
          }
        }

        if (current.trim()) chunks.push(current.trim());
        return chunks;
      }

      function breakClauses(sql, options) {
        let result = ` ${sql} `;
        const joinProtected = protectJoinPhrases(result);
        result = joinProtected.result;

        for (const clause of MAIN_CLAUSES) {
          const view = keywordTransform(clause, options.keywordCase);
          const pattern = new RegExp(
            `\\s+${escapeRegExp(view).replace(/ /g, "\\s+")}\\b`,
            "g",
          );
          result = result.replace(pattern, `\n${view}`);
        }

        if (options.newlineBeforeJoin) {
          result = result.replace(/\s+(__JOIN_\d+__)/g, "\n$1");
        }

        if (options.newlineBeforeAnd) {
          const betweenProtected = protectBetweenAnd(result, options);
          result = betweenProtected.result;

          const andWord = keywordTransform("AND", options.keywordCase);
          const orWord = keywordTransform("OR", options.keywordCase);
          result = result.replace(
            new RegExp(`\\s+${andWord}\\b`, "g"),
            `\n${andWord}`,
          );
          result = result.replace(
            new RegExp(`\\s+${orWord}\\b`, "g"),
            `\n${orWord}`,
          );
          result = restoreBetweenAnd(result, betweenProtected.betweenAnds);
        }

        result = restoreJoinPhrases(
          result,
          joinProtected.joins,
          options.keywordCase,
        );
        return result.replace(/\n{3,}/g, "\n\n").trim();
      }

      function splitSelectBodyPreservingHead(body) {
        const trimmed = body.trim();
        const topMatch = trimmed.match(
          /^(TOP\s*\([^)]*\)|TOP\s+\d+\s*(PERCENT)?|DISTINCT)\b\s*(.*)$/i,
        );

        if (!topMatch) {
          return { head: "", remainder: trimmed };
        }

        return {
          head: topMatch[1].trim(),
          remainder: topMatch[3].trim(),
        };
      }

      function formatCteBlocks(sql, options) {
        const withWord = keywordTransform("WITH", options.keywordCase);
        const asWord = keywordTransform("AS", options.keywordCase);

        return sql
          .replace(
            /\bWITH\s+([A-Za-z0-9_#\[\]\.]+)\s+AS\s*\(/gi,
            `${withWord} $1 ${asWord} (`,
          )
          .replace(/\)\s*,\s*([A-Za-z0-9_#\[\]\.]+\s+AS\s*\()/gi, `)\n    , $1`)
          .replace(/\n\s*,\s*([A-Za-z0-9_#\[\]\.]+\s+AS\s*\()/gi, `\n    , $1`);
      }

      function formatCaseBlocks(sql, options) {
        const caseWord = keywordTransform("CASE", options.keywordCase);
        const whenWord = keywordTransform("WHEN", options.keywordCase);
        const elseWord = keywordTransform("ELSE", options.keywordCase);
        const endWord = keywordTransform("END", options.keywordCase);
        const thenWord = keywordTransform("THEN", options.keywordCase);

        return sql
          .replace(/\s*\bCASE\b\s*/gi, `\n${caseWord}\n`)
          .replace(/\s*\bWHEN\b\s*/gi, `\n${whenWord} `)
          .replace(/\s*\bELSE\b\s*/gi, `\n${elseWord} `)
          .replace(/\s*\bEND\b/gi, `\n${endWord}`)
          .replace(/\s*\bTHEN\b\s*/gi, ` ${thenWord} `)
          .replace(/\n{3,}/g, "\n\n");
      }

      function formatInsertColumns(sql, options) {
        const lines = sql.split("\n");
        const out = [];

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();

          if (!/^INSERT\s+INTO\b/i.test(line) || !/\(/.test(line)) {
            out.push(lines[i]);
            continue;
          }

          let collected = [line];
          let depth =
            (line.match(/\(/g) || []).length - (line.match(/\)/g) || []).length;
          let j = i + 1;

          while (j < lines.length && depth > 0) {
            const current = lines[j].trim();
            collected.push(current);
            depth +=
              (current.match(/\(/g) || []).length -
              (current.match(/\)/g) || []).length;
            j += 1;
          }

          const joined = collected.join(" ").replace(/\s+/g, " ").trim();
          const m = joined.match(/^(INSERT\s+INTO\s+.+?)\s*\((.+)\)$/i);

          if (!m) {
            out.push(lines[i]);
            continue;
          }

          const header = m[1].trim();
          const columns = splitTopLevel(m[2]).filter(Boolean);

          if (columns.length <= 1) {
            out.push(lines[i]);
            continue;
          }

          out.push(header);
          out.push("(");
          columns.forEach((col, idx) => {
            const prefix = idx === 0 ? "     " : "    ,";
            out.push(prefix + col.trim());
          });
          out.push(")");

          i = j - 1;
        }

        return out.join("\n");
      }

      function formatProcParams(sql, options) {
        if (!options.alignProcParams) return sql;

        const lines = sql.split("\n");
        const out = [];

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();

          if (!/^(CREATE|ALTER)\s+(PROC|PROCEDURE)\b/i.test(line)) {
            out.push(lines[i]);
            continue;
          }

          let j = i;
          const block = [];

          while (j < lines.length) {
            const current = lines[j].trim();
            block.push(current);
            if (/\bAS\b/i.test(current)) break;
            j += 1;
          }

          const fullText = block.join(" ").replace(/\s+/g, " ").trim();
          const m = fullText.match(
            /^((?:CREATE|ALTER)\s+(?:PROC|PROCEDURE)\s+[^\s]+)\s+(.+?)\s+AS$/i,
          );

          if (!m) {
            for (let k = i; k <= j; k++) out.push(lines[k]);
            i = j;
            continue;
          }

          const header = m[1];
          const paramText = m[2];
          const params = splitTopLevel(paramText).filter(Boolean);

          if (!params.length || !params.every((v) => /^@/.test(v.trim()))) {
            for (let k = i; k <= j; k++) out.push(lines[k]);
            i = j;
            continue;
          }

          const parsed = params.map(parseVarDeclarationItem);

          if (parsed.some((v) => v.raw)) {
            for (let k = i; k <= j; k++) out.push(lines[k]);
            i = j;
            continue;
          }

          const baseIndent = " ".repeat(options.indentSize || 2);

          out.push(header);
          parsed.forEach((v, idx) => {
            const prefix = idx === 0 ? baseIndent : baseIndent + ",";
            out.push(
              prefix +
                v.name +
                " " +
                v.type +
                (v.assign ? " = " + v.assign : ""),
            );
          });
          out.push("AS");

          i = j;
        }

        return out.join("\n");
      }

      function formatDeclareBlocks(sql, options) {
        if (!options.alignDeclare) return sql;

        const lines = sql.split("\n");
        const out = [];

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();

          if (!/^DECLARE\b/i.test(line)) {
            out.push(lines[i]);
            continue;
          }

          let j = i;
          const block = [];

          while (j < lines.length) {
            const current = lines[j].trim();
            if (j > i && CLAUSE_START_REGEX.test(current)) break;
            if (current !== "") block.push(current);
            j += 1;
          }

          const fullText = block
            .join(" ")
            .replace(/^DECLARE\s+/i, "")
            .replace(/\s*,\s*/g, ", ")
            .replace(/\s+/g, " ")
            .trim();

          const items = splitTopLevel(fullText).filter(Boolean);

          if (!items.length || !items.every((v) => /^@/.test(v.trim()))) {
            for (let k = i; k < j; k++) out.push(lines[k]);
            i = j - 1;
            continue;
          }

          const parsed = items.map(parseVarDeclarationItem);

          if (parsed.some((v) => v.raw)) {
            for (let k = i; k < j; k++) out.push(lines[k]);
            i = j - 1;
            continue;
          }

          out.push(
            keywordTransform("DECLARE", options.keywordCase) +
              " " +
              parsed[0].name +
              " " +
              parsed[0].type +
              (parsed[0].assign ? " = " + parsed[0].assign : "") +
              ",",
          );
          for (let k = 1; k < parsed.length; k++) {
            const v = parsed[k];
            const isLast = k === parsed.length - 1;
            out.push(
              "        " +
                v.name +
                " " +
                v.type +
                (v.assign ? " = " + v.assign : "") +
                (isLast ? "" : ","),
            );
          }

          i = j - 1;
        }

        return out.join("\n");
      }

      function formatExecParams(sql, options) {
        const lines = sql.split("\n");
        const out = [];
        const execWord = keywordTransform("EXEC", options.keywordCase);

        for (const raw of lines) {
          const line = raw.trim();
          if (!/^EXEC(?:UTE)?\b/i.test(line) || !/@/.test(line)) {
            out.push(raw);
            continue;
          }

          const match = line.match(/^(EXEC(?:UTE)?\s+[^@\s]+)\s+(.+)$/i);
          if (!match) {
            out.push(raw);
            continue;
          }

          const header = match[1]
            .replace(/^EXECUTE/i, execWord)
            .replace(/^EXEC/i, execWord)
            .trim();
          const params = splitTopLevel(match[2].trim());
          if (params.length <= 1) {
            out.push(raw);
            continue;
          }

          out.push(header);
          params.forEach((p, idx) => {
            out.push((idx === 0 ? "     " : "    ,") + p.trim());
          });
        }

        return out.join("\n");
      }

      function splitAssignmentTopLevel(text) {
        let depth = 0;
        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          if (ch === "(") depth += 1;
          else if (ch === ")") depth = Math.max(0, depth - 1);
          else if (ch === "=" && depth === 0) {
            return {
              left: text.slice(0, i).trim(),
              right: text.slice(i + 1).trim(),
            };
          }
        }
        return { left: text.trim(), right: "" };
      }

      function parseVarDeclarationItem(item) {
        const split = splitAssignmentTopLevel(item.trim());
        const m = split.left.match(/^(@[A-Za-z0-9_#]+)\s+(.+)$/);
        if (!m) return { raw: item.trim() };
        return {
          name: m[1],
          type: m[2].trim(),
          assign: split.right,
        };
      }

      function splitAlias(item) {
        const m = item.match(/^(.*?)(\s+AS\s+.+)$/i);
        if (m) return { left: m[1].trim(), alias: m[2].trim() };
        return { left: item.trim(), alias: "" };
      }

      function formatSelectLists(sql, options) {
        if (!options.alignSelectList) return sql;

        const lines = sql.split("\n");
        const out = [];

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();

          if (!/^SELECT\b/i.test(line)) {
            out.push(lines[i]);
            continue;
          }

          const collected = [line.replace(/^SELECT\s+/i, "")];
          let j = i + 1;

          while (j < lines.length) {
            const current = lines[j].trim();
            if (
              !current ||
              /^(FROM|WITH|WHERE|GROUP BY|ORDER BY|HAVING|UNION|JOIN|LEFT JOIN|RIGHT JOIN|FULL JOIN|INNER JOIN|CROSS JOIN|OUTER APPLY|CROSS APPLY|SELECT|EXEC|EXECUTE|IF|BEGIN|DECLARE|SET|RETURN|UPDATE|INSERT|DELETE|CREATE|ALTER|DROP|TRUNCATE|WHILE|GO)\b/i.test(
                current,
              )
            ) {
              break;
            }
            collected.push(current.replace(/^,\s*/, ""));
            j += 1;
          }

          const joined = collected.join(" ");
          const { head, remainder } = splitSelectBodyPreservingHead(joined);
          const parts = splitTopLevel(remainder).filter(Boolean);

          if (parts.length <= 1) {
            out.push(lines[i]);
            continue;
          }

          const parsed = parts.map(splitAlias);
          const leftWidth = Math.max(...parsed.map((v) => v.left.length));
          const selectHead = head ? `SELECT ${head} ` : "SELECT ";

          parsed.forEach((v, idx) => {
            const aliasText = v.alias ? " " + v.alias : "";
            if (idx === 0) {
              out.push(selectHead + v.left.padEnd(leftWidth) + aliasText);
            } else {
              const commaPrefix = options.breakBeforeComma
                ? "          ,"
                : "          ";
              out.push(
                commaPrefix +
                  (options.breakBeforeComma ? "" : ", ") +
                  v.left.padEnd(leftWidth) +
                  aliasText,
              );
            }
          });

          i = j - 1;
        }

        return out.join("\n");
      }

      function formatSetClauses(sql, options) {
        if (!options.alignSetClause) return sql;

        const lines = sql.split("\n");
        const out = [];

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();

          if (!/^SET\b/i.test(line)) {
            out.push(lines[i]);
            continue;
          }

          const collected = [line.replace(/^SET\s+/i, "")];
          let j = i + 1;

          while (j < lines.length) {
            const current = lines[j].trim();
            if (!current || CLAUSE_START_REGEX.test(current)) break;
            collected.push(current.replace(/^,\s*/, ""));
            j += 1;
          }

          const items = splitTopLevel(collected.join(" ")).filter(Boolean);
          if (items.length <= 1) {
            out.push(lines[i]);
            continue;
          }

          out.push(
            keywordTransform("SET", options.keywordCase) + " " + items[0],
          );
          for (let k = 1; k < items.length; k++) {
            out.push("    ," + " " + items[k]);
          }

          i = j - 1;
        }

        let result = out.join("\n");
        result = result.replace(
          /(SET\s+[^=\n]+\=)\s*\n\s*CASE\b/gi,
          "$1  CASE",
        );
        result = result.replace(/(,\s*[^=\n]+\=)\s*\n\s*CASE\b/gi, "$1  CASE");
        return result;
      }

      function alignJoinBlock(lines, startIndex, baseIndent) {
        const joinLine = lines[startIndex].trim().replace(/\s+/g, " ");
        let j = startIndex + 1;
        const out = [];
        let merged = baseIndent + joinLine;
        let anchorCol = -1;

        if (j < lines.length && /^ON\b/i.test(lines[j].trim())) {
          const onLine = lines[j].trim().replace(/\s+/g, " ");
          merged += " " + onLine;
          anchorCol = merged.toUpperCase().indexOf(" ON ");
          if (anchorCol < 0) anchorCol = merged.toUpperCase().indexOf("ON ");
          j += 1;
        }

        out.push(merged);

        while (j < lines.length && /^(AND|OR)\b/i.test(lines[j].trim())) {
          const current = lines[j].trim().replace(/\s+/g, " ");
          if (anchorCol >= 0) {
            out.push(
              baseIndent +
                " ".repeat(Math.max(anchorCol - baseIndent.length, 1)) +
                current,
            );
          } else {
            out.push(baseIndent + "     " + current);
          }
          j += 1;
        }

        return { lines: out, nextIndex: j - 1 };
      }

      function alignWhereBlock(lines, startIndex, baseIndent) {
        const out = [];
        const whereLine = lines[startIndex].trim().replace(/\s+/g, " ");
        out.push(baseIndent + whereLine);

        let j = startIndex + 1;
        while (j < lines.length) {
          const current = lines[j].trim();
          if (!/^(AND|OR)\b/i.test(current)) break;

          const normalized = current.replace(/\s+/g, " ");
          if (/^OR\b/i.test(normalized)) {
            out.push(baseIndent + "   " + normalized);
          } else {
            out.push(baseIndent + "  " + normalized);
          }
          j += 1;
        }

        return { lines: out, nextIndex: j - 1 };
      }

      function indentLines(sql, options) {
        const unit = " ".repeat(options.indentSize);
        const lines = sql.split("\n");
        const out = [];

        let level = 0;
        let procBodyLevel = 0;
        let inProcHeader = false;
        let singleLineIfDepth = 0;
        let execContinuation = false;

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) {
            out.push("");
            execContinuation = false;
            continue;
          }

          const upper = line.toUpperCase();

          if (/^(CREATE|ALTER)\s+(PROC|PROCEDURE)\b/.test(upper)) {
            inProcHeader = true;
            procBodyLevel = 0;
            out.push(line);
            continue;
          }

          if (inProcHeader && /^@/.test(line)) {
            out.push(unit + line);
            continue;
          }

          if (inProcHeader && /^AS\b/.test(upper)) {
            out.push("AS");
            out.push("");
            inProcHeader = false;
            procBodyLevel = 1;
            continue;
          }

          let tempIndent = 0;
          if (/^(END|ELSE|END TRY|END CATCH)\b/.test(upper)) {
            level = Math.max(0, level - 1);
            singleLineIfDepth = 0;
          }

          if (
            singleLineIfDepth > 0 &&
            !/^(AND|OR)\b/i.test(line) &&
            !/^(LEFT OUTER JOIN|RIGHT OUTER JOIN|FULL OUTER JOIN|INNER JOIN|LEFT JOIN|RIGHT JOIN|FULL JOIN|CROSS JOIN|JOIN|OUTER APPLY|CROSS APPLY)\b/i.test(
              line,
            )
          ) {
            tempIndent = 1;
          }

          const baseIndent = unit.repeat(procBodyLevel + level);

          if (
            /^(LEFT OUTER JOIN|RIGHT OUTER JOIN|FULL OUTER JOIN|INNER JOIN|LEFT JOIN|RIGHT JOIN|FULL JOIN|CROSS JOIN|JOIN|OUTER APPLY|CROSS APPLY)\b/i.test(
              line,
            )
          ) {
            const aligned = alignJoinBlock(lines, i, baseIndent);
            aligned.lines.forEach((v) => out.push(v));
            i = aligned.nextIndex;
            singleLineIfDepth = 0;
            continue;
          }

          if (/^WHERE\b/i.test(line)) {
            const aligned = alignWhereBlock(lines, i, baseIndent);
            aligned.lines.forEach((v) => out.push(v));
            i = aligned.nextIndex;
            singleLineIfDepth = 0;
            continue;
          }

          if (/^WITH\b/i.test(line)) {
            out.push(baseIndent + line);
            singleLineIfDepth = 0;
            continue;
          }

          if (/^,\s*[A-Za-z0-9_#\[\]\.]+\s+AS\b/i.test(line)) {
            out.push(baseIndent + unit + line);
            singleLineIfDepth = 0;
            continue;
          }

          if (/^FROM\b/i.test(line)) {
            out.push(baseIndent + line);
            singleLineIfDepth = 0;
            continue;
          }

          if (/^SELECT\b/i.test(line)) {
            out.push(baseIndent + line);
            singleLineIfDepth = 0;
            continue;
          }

          let indentLevel = procBodyLevel + level + tempIndent;
          if (/^,/.test(line)) indentLevel += 1;
          if (/^(AND|OR)\b/i.test(line)) indentLevel += 1;
          if (/^(WHEN|ELSE)\b/i.test(line)) indentLevel += 1;

          out.push(unit.repeat(indentLevel) + line);

          if (
            /\bBEGIN\b/i.test(upper) ||
            /\bCASE\b/i.test(upper) ||
            /^BEGIN TRY\b/i.test(upper) ||
            /^BEGIN CATCH\b/i.test(upper)
          ) {
            level += 1;
            singleLineIfDepth = 0;
            continue;
          }

          if (/^IF\b/i.test(upper) || /^WHILE\b/i.test(upper)) {
            if (/\bBEGIN\b/i.test(upper)) {
              level += 1;
              singleLineIfDepth = 0;
            } else {
              singleLineIfDepth = 1;
            }
            continue;
          }

          if (/^ELSE\b/i.test(upper)) {
            if (/\bBEGIN\b/i.test(upper)) {
              level += 1;
              singleLineIfDepth = 0;
            } else {
              singleLineIfDepth = 1;
            }
            continue;
          }

          if (singleLineIfDepth > 0) {
            singleLineIfDepth = 0;
          }
        }

        return out
          .join("\n")
          .replace(/\n{3,}/g, "\n\n")
          .replace(/\bBEGIN\n\nBEGIN\b/g, "BEGIN")
          .trim();
      }

      // 한 줄이 너무 길면 의미가 명확한 break point에서 줄을 나눈다.
      // 토큰화된 상태(restoreSegments 직전)에서 호출해서 실제 문자열 내부 콤마는
      // 절대 건드리지 않도록 한다. store 인자로 실제 길이를 환산해 임계값 판단.
      // 재귀 대신 stack 기반 반복 — 분할이 깊게 누적돼도 호출 스택 한도에 안 걸린다.
      function wrapLongLines(sql, store, maxWidth) {
        function effectiveLen(line) {
          return line.replace(/__PROTECTED_(\d+)__/g, (_, idx) => {
            const v = store && store[Number(idx)];
            return v == null ? "" : String(v);
          }).length;
        }
        function trySplit(line) {
          const indent = (line.match(/^[ \t]*/) || [""])[0];
          const contIndent = indent + "  ";
          const beforeLen = effectiveLen(line);
          // 분할이 진정한 진전을 만들었을 때만 적용. 단일 토큰(긴 문자열 등)이
          // 그 자체로 maxWidth 초과인 경우, 어떤 분리도 길이를 줄이지 못한다.
          // 이때 그냥 두지 않으면 indent만 +2씩 누적하며 무한 분리하게 된다.
          function progressed(parts) {
            if (parts.length <= 1) return false;
            let maxLen = 0;
            for (const p of parts) {
              const len = effectiveLen(p);
              if (len > maxLen) maxLen = len;
            }
            return maxLen < beforeLen;
          }
          // a) 서브쿼리 묶음 `), (SELECT ...` 사이 분리
          let after = line.replace(
            /\)\s*,\s*\(\s*(?=SELECT\b)/gi,
            ")\n" + contIndent + ", (",
          );
          if (after !== line) {
            const parts = after.split("\n");
            if (progressed(parts)) return parts;
          }
          // b) 문자열/식별자/괄호 concat: ` + '...'`, ` + N'...'`, ` + @x`, ` + (`
          after = line.replace(
            / \+ (?=N?__PROTECTED_|@[A-Za-z0-9_#]|\()/g,
            "\n" + contIndent + "+ ",
          );
          if (after !== line) {
            const parts = after.split("\n");
            if (progressed(parts)) return parts;
          }
          return null;
        }
        const out = [];
        const initial = sql.split("\n");
        // LIFO 스택에 역순 push → 출력은 원래 순서 유지
        const stack = [];
        for (let i = initial.length - 1; i >= 0; i--) stack.push(initial[i]);
        const MAX_ITER = initial.length * 50 + 1000;
        let iter = 0;
        while (stack.length) {
          if (++iter > MAX_ITER) {
            // 비상 종료: 남은 라인 그대로 출력
            while (stack.length) out.push(stack.pop());
            break;
          }
          const line = stack.pop();
          if (effectiveLen(line) <= maxWidth) {
            out.push(line);
            continue;
          }
          const split = trySplit(line);
          if (!split || split.length <= 1) {
            out.push(line);
            continue;
          }
          for (let i = split.length - 1; i >= 0; i--) stack.push(split[i]);
        }
        return out.join("\n");
      }

      function cleanupResult(sql) {
        let result = sql
          .replace(/[ \t]+\n/g, "\n")
          .replace(/\n{2,}/g, "\n")
          .replace(/\bWITH\s*\(\s*NOLOCK\s*\)/gi, "WITH(NOLOCK)")
          .replace(/\bTHEN\s+/gi, "THEN ")
          .replace(/\n\s*\)/g, "\n)")
          .replace(/\bGO\b\s*\n\s*\bGO\b/gi, "GO");

        // 연속된 @변수 선언 사이에 끼어든 빈 줄 제거 (PROC 파라미터/DECLARE 블록 등)
        let prev;
        do {
          prev = result;
          result = result.replace(
            /([ \t]*(?:,\s*)?@[A-Za-z0-9_#]+[^\n]*)\n[ \t]*\n(?=[ \t]*(?:,\s*)?@[A-Za-z0-9_#]+)/g,
            "$1\n",
          );
        } while (result !== prev);

        return result.trim();
      }

      function postFormatFixes(sql) {
        let result = sql;
        const lines = result.split("\n");
        const fixedLines = [];

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const trimmed = line.trim();

          if (/^EXEC\b/i.test(trimmed)) {
            const indent = (line.match(/^\s*/) || [""])[0];
            fixedLines.push(line);
            let j = i + 1;
            let first = true;

            while (j < lines.length) {
              const next = lines[j].trim();
              if (!next || !/^[@,]/.test(next)) break;
              fixedLines.push(indent + (first ? "     " : "    ") + next);
              first = false;
              j += 1;
            }

            i = j - 1;
            continue;
          }

          fixedLines.push(line);
        }

        result = fixedLines.join("\n");
        result = result
          .replace(/(^|\n)([ \t]*)--\s*\n([ \t]*)([^\n]+)/g, "$1$2-- $4")
          .replace(/(SET\s+[^=\n]+\=)\s*\n\s*CASE\b/gi, "$1  CASE")
          .replace(/(,\s*[^=\n]+\=)\s*\n\s*CASE\b/gi, "$1  CASE")
          .replace(
            /(\n[ \t]*[A-Za-z0-9_#\[\]\.]+\s*=)\s*\n\s*CASE\b/g,
            "$1  CASE",
          )
          .replace(/(\bELSE\s+IF\b[^\n]*?)\s+(?=BEGIN\b)/gi, "$1\n")
          .replace(/(\bSELECT\s+@[^\n]*?)(?=\s+SELECT\s+@)/gi, "$1\n");

        const brokenKeywords = [
          [
            "END",
            /\bEND(?=(SELECT|UPDATE|INSERT|CREATE|DECLARE|RETURN|EXEC|SET|WITH|IF|ELSE|WHILE|FROM|WHERE|GROUP|ORDER|HAVING|JOIN|AND|OR|BEGIN|CASE|DELETE|TRUNCATE|DROP|ALTER|UNION|VALUES|OUTPUT|INTO)\b)/gi,
          ],
          [
            "BEGIN",
            /\bBEGIN(?=(SELECT|UPDATE|INSERT|CREATE|DECLARE|RETURN|EXEC|SET|WITH|IF|ELSE|WHILE)\b)/gi,
          ],
          [
            "RETURN",
            /\bRETURN(?=(SELECT|UPDATE|INSERT|CREATE|DECLARE|EXEC|SET|WITH|IF|ELSE|WHILE|BEGIN)\b)/gi,
          ],
        ];

        const out = [];
        for (const rawLine of result.split("\n")) {
          if (!rawLine.trim() || /^\s*--/.test(rawLine)) {
            out.push(rawLine);
            continue;
          }

          const indent = (rawLine.match(/^\s*/) || [""])[0];
          let current = rawLine;

          for (const [, pattern] of brokenKeywords) {
            current = current.replace(pattern, (m) => m + "\n" + indent);
          }

          for (const part of current.split("\n")) {
            out.push(part);
          }
        }

        return out.join("\n").replace(/\n{3,}/g, "\n\n");
      }
      // 모든 파이프라인이 끝난 뒤 DECLARE 블록을 "DECLARE 키워드 폭만큼 들여쓰기 + 꼬리 콤마"로 재정렬
      function realignDeclareBlocks(sql, options) {
        if (!options.alignDeclare) return sql;
        const lines = sql.split("\n");
        const out = [];
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const trimmed = line.trim();
          if (!/^DECLARE\b/i.test(trimmed)) {
            out.push(line);
            continue;
          }
          const indent = (line.match(/^[ \t]*/) || [""])[0];
          const blockLines = [trimmed];
          let j = i + 1;
          while (j < lines.length) {
            const ct = lines[j].trim();
            if (ct === "") {
              j++;
              continue;
            }
            if (/^,?\s*@[A-Za-z0-9_#]/.test(ct)) {
              blockLines.push(ct);
              j++;
              continue;
            }
            break;
          }
          let joined = blockLines
            .join(" ")
            .replace(/^DECLARE\s+/i, "")
            .replace(/\s+/g, " ")
            .trim();
          const hasTrailingComma = /,\s*$/.test(joined);
          if (hasTrailingComma) joined = joined.replace(/,\s*$/, "");
          const items = splitTopLevel(joined).filter(Boolean);
          if (!items.length || !items.every((v) => /^@/.test(v.trim()))) {
            for (let k = i; k < j; k++) out.push(lines[k]);
            i = j - 1;
            continue;
          }
          const parsed = items.map(parseVarDeclarationItem);
          if (parsed.some((v) => v.raw)) {
            for (let k = i; k < j; k++) out.push(lines[k]);
            i = j - 1;
            continue;
          }
          const declareWord = keywordTransform("DECLARE", options.keywordCase);
          const contIndent = indent + " ".repeat(declareWord.length + 1);
          parsed.forEach((v, idx) => {
            const isLast = idx === parsed.length - 1;
            const suffix = isLast && !hasTrailingComma ? "" : ",";
            const typePart = v.type + (v.assign ? " = " + v.assign : "");
            const body = v.name + " " + typePart + suffix;
            if (idx === 0) out.push(indent + declareWord + " " + body);
            else out.push(contIndent + body);
          });
          i = j - 1;
        }
        return out.join("\n");
      }

      // SELECT 다중 컬럼을 첫 컬럼 위치로 정렬 + 꼬리 콤마 스타일로 재정렬
      function realignSelectColumns(sql, options) {
        if (!options.alignSelectList) return sql;
        const lines = sql.split("\n");
        const out = [];
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const trimmed = line.trim();
          const m = trimmed.match(
            /^(SELECT(?:\s+(?:TOP\s*\([^)]*\)|TOP\s+\d+(?:\s+PERCENT)?|DISTINCT))?)\s+(.+)$/i,
          );
          if (!m) {
            out.push(line);
            continue;
          }
          const indent = (line.match(/^[ \t]*/) || [""])[0];
          const head = m[1]; // e.g. "SELECT" or "SELECT TOP 10"
          const firstBody = m[2];
          // 연속 라인 수집: ',col' 형태로 머리 콤마가 붙은 후속 라인만
          const collected = [firstBody.replace(/^,\s*/, "")];
          let j = i + 1;
          let hasCont = false;
          while (j < lines.length) {
            const ct = lines[j].trim();
            if (ct === "") {
              j++;
              continue;
            }
            if (/^,/.test(ct)) {
              collected.push(ct.replace(/^,\s*/, ""));
              hasCont = true;
              j++;
              continue;
            }
            break;
          }
          if (!hasCont) {
            out.push(line);
            continue;
          }
          // 다시 합쳐서 top-level 콤마 기준으로 분리 (각 line이 이미 콤마 없는 단일 컬럼이면 그대로)
          const joined = collected.join(", ").trim();
          const items = splitTopLevel(joined).filter(Boolean);
          if (items.length <= 1) {
            // 단일 컬럼이라면 다중 라인 의미 없음
            for (let k = i; k < j; k++) out.push(lines[k]);
            i = j - 1;
            continue;
          }
          const headWithSpace = head + " ";
          const contIndent = indent + " ".repeat(headWithSpace.length);
          items.forEach((it, idx) => {
            const isLast = idx === items.length - 1;
            const suffix = isLast ? "" : ",";
            if (idx === 0)
              out.push(indent + headWithSpace + it.trim() + suffix);
            else out.push(contIndent + it.trim() + suffix);
          });
          i = j - 1;
        }
        return out.join("\n");
      }

      function prettifySql(input, options) {
        let sql = normalizeLineBreaks(input).trim();
        if (!sql) return "";

        const protectedData = protectSegments(sql);
        sql = protectedData.result;
        sql = normalizeMissingKeywordSpaces(sql);

        sql = formatProcParams(sql, options);
        sql = formatDeclareBlocks(sql, options);
        sql = formatInsertColumns(sql, options);
        sql = collapseSpaces(sql);
        if (options.spaceAroundOperator) sql = normalizeOperators(sql);
        sql = applyKeywordCase(sql, options.keywordCase);
        sql = formatCteBlocks(sql, options);
        sql = breakClauses(sql, options);
        sql = formatCaseBlocks(sql, options);
        sql = formatExecParams(sql, options);
        sql = formatSelectLists(sql, options);
        sql = formatSetClauses(sql, options);
        sql = indentLines(sql, options);

        // 주석/문자열을 복원하기 전에 후처리까지 끝내야 한다.
        // 복원 후 정규식을 돌리면 인라인 주석이나 문자열 내부 텍스트가 실제 SQL처럼 쪼개질 수 있다.
        sql = postFormatFixes(sql);
        sql = cleanupResult(sql);
        // 토큰화 상태에서 라인 길이 기반 wrap (문자열 내부 콤마 보호)
        sql = wrapLongLines(sql, protectedData.store, 140);
        sql = restoreSegments(sql, protectedData.store);
        // 복원된 주석에 딸려온 \n으로 빈 줄이 새로 생길 수 있어 마지막으로 한 번 더 정리
        sql = sql.replace(/[ \t]+\n/g, "\n").replace(/\n{2,}/g, "\n");
        // 최종 시각 정렬: DECLARE / SELECT 다중컬럼 → 꼬리 콤마 + 첫 컬럼 정렬
        sql = realignDeclareBlocks(sql, options);
        sql = realignSelectColumns(sql, options);
        return sql.trim();
      }

      function getOptions() {
        return {
          indentSize: Number(el("indentSize").value) || 4,
          keywordCase: el("keywordCase").value,

          // 테스트 단계로 화면에서는 체크박스 UI를 숨기고, 코드상 항상 true 처리
          alignDeclare: true,
          alignProcParams: true,
          alignSelectList: true,
          alignSetClause: true,
          breakBeforeComma: true,
          newlineBeforeJoin: true,
          newlineBeforeAnd: true,
          spaceAroundOperator: true,
        };
      }

      function setStatus(message) {
        el("status").textContent = message;
      }

      function diffSignature(line) {
        return line.trim().replace(/\s+/g, " ").toUpperCase();
      }

      function computeLineDiff(inputText, outputText) {
        const aRaw = (inputText || "").split("\n");
        const bRaw = (outputText || "").split("\n");
        const a = aRaw.map(diffSignature);
        const b = bRaw.map(diffSignature);
        const m = a.length;
        const n = b.length;

        let ops;
        if (m * n > 2_000_000) {
          ops = [];
          for (const v of aRaw) ops.push({ type: "remove", value: v });
          for (const v of bRaw) ops.push({ type: "add", value: v });
        } else {
          const dp = Array.from({ length: m + 1 }, () => new Int32Array(n + 1));
          for (let i = m - 1; i >= 0; i--) {
            for (let j = n - 1; j >= 0; j--) {
              if (a[i] === b[j]) dp[i][j] = dp[i + 1][j + 1] + 1;
              else dp[i][j] = Math.max(dp[i + 1][j], dp[i][j + 1]);
            }
          }
          ops = [];
          let i = 0;
          let j = 0;
          while (i < m && j < n) {
            if (a[i] === b[j]) {
              ops.push({ type: "equal", value: bRaw[j] });
              i++;
              j++;
            } else if (dp[i + 1][j] >= dp[i][j + 1]) {
              ops.push({ type: "remove", value: aRaw[i] });
              i++;
            } else {
              ops.push({ type: "add", value: bRaw[j] });
              j++;
            }
          }
          while (i < m) ops.push({ type: "remove", value: aRaw[i++] });
          while (j < n) ops.push({ type: "add", value: bRaw[j++] });
        }

        let oldNum = 0;
        let newNum = 0;
        for (const op of ops) {
          if (op.type === "equal") {
            op.oldNum = ++oldNum;
            op.newNum = ++newNum;
          } else if (op.type === "remove") {
            op.oldNum = ++oldNum;
          } else {
            op.newNum = ++newNum;
          }
        }
        return ops;
      }

      function renderDiff(input, output) {
        const card = el("diffCard");
        const view = el("diffView");
        const summary = el("diffSummary");

        if (!input && !output) {
          card.hidden = true;
          return;
        }
        card.hidden = false;

        const ops = computeLineDiff(input, output);
        latestDiffOps = ops;
        let added = 0;
        let removed = 0;
        const fragment = document.createDocumentFragment();

        for (const op of ops) {
          const line = document.createElement("div");
          line.className = "diff-line " + op.type;

          const oldGn = document.createElement("span");
          oldGn.className = "diff-gn old";
          oldGn.textContent = op.oldNum != null ? String(op.oldNum) : "";

          const newGn = document.createElement("span");
          newGn.className = "diff-gn new";
          newGn.textContent = op.newNum != null ? String(op.newNum) : "";

          const text = document.createElement("span");
          text.className = "diff-text";
          const marker =
            op.type === "add" ? "+ " : op.type === "remove" ? "- " : "  ";
          text.textContent = marker + (op.value || "");

          line.appendChild(oldGn);
          line.appendChild(newGn);
          line.appendChild(text);
          fragment.appendChild(line);

          if (op.type === "add") added++;
          else if (op.type === "remove") removed++;
        }

        view.innerHTML = "";
        if (added === 0 && removed === 0) {
          const empty = document.createElement("div");
          empty.className = "diff-empty";
          empty.textContent = "내용 변화 없음 (공백/줄바꿈도 동일)";
          view.appendChild(empty);
        } else {
          view.appendChild(fragment);
        }

        summary.innerHTML =
          `<span class="add-count">+${added}</span>` +
          `<span class="rem-count">-${removed}</span>`;
      }

      function setupGutter(textareaId, gutterId, options) {
        const ta = el(textareaId);
        const gutter = el(gutterId);
        if (!ta || !gutter) return () => {};

        const clickable = options && options.clickable;
        const onClick = options && options.onClick;

        if (clickable) gutter.classList.add("clickable");

        function update() {
          const value = ta.value;
          const count = value === "" ? 1 : value.split("\n").length;
          const frag = document.createDocumentFragment();
          for (let i = 1; i <= count; i++) {
            const span = document.createElement("span");
            span.className = "gn-line";
            span.dataset.line = String(i);
            span.textContent = String(i);
            frag.appendChild(span);
          }
          gutter.replaceChildren(frag);
        }

        function syncScroll() {
          gutter.scrollTop = ta.scrollTop;
        }

        ta.addEventListener("input", update);
        ta.addEventListener("scroll", syncScroll);

        if (clickable && onClick) {
          gutter.addEventListener("click", (e) => {
            const target = e.target.closest(".gn-line");
            if (!target) return;
            const lineNum = parseInt(target.dataset.line, 10);
            if (!Number.isFinite(lineNum)) return;
            gutter
              .querySelectorAll(".gn-line.active")
              .forEach((n) => n.classList.remove("active"));
            target.classList.add("active");
            onClick(lineNum);
          });
        }

        update();
        return update;
      }

      let latestDiffOps = [];

      function jumpToOutputLine(inputLine) {
        if (!latestDiffOps.length) return;
        const outputTa = el("outputSql");
        if (!outputTa || !outputTa.value) return;

        let targetLine = null;
        const idx = latestDiffOps.findIndex((op) => op.oldNum === inputLine);
        if (idx === -1) return;

        const op = latestDiffOps[idx];
        if (op.newNum != null) {
          targetLine = op.newNum;
        } else {
          for (let j = idx + 1; j < latestDiffOps.length; j++) {
            if (latestDiffOps[j].newNum != null) {
              targetLine = latestDiffOps[j].newNum;
              break;
            }
          }
          if (targetLine == null) {
            for (let j = idx - 1; j >= 0; j--) {
              if (latestDiffOps[j].newNum != null) {
                targetLine = latestDiffOps[j].newNum;
                break;
              }
            }
          }
        }

        if (targetLine == null) return;

        const style = getComputedStyle(outputTa);
        const fontSize = parseFloat(style.fontSize) || 13;
        let lineHeight = parseFloat(style.lineHeight);
        if (!Number.isFinite(lineHeight)) lineHeight = fontSize * 1.45;

        const targetY = (targetLine - 1) * lineHeight;
        const centered =
          targetY - outputTa.clientHeight / 2 + lineHeight / 2;
        outputTa.scrollTop = Math.max(0, centered);

        const lines = outputTa.value.split("\n");
        let offset = 0;
        for (let i = 0; i < targetLine - 1 && i < lines.length; i++) {
          offset += lines[i].length + 1;
        }
        const endOffset = offset + (lines[targetLine - 1] || "").length;
        try {
          outputTa.focus({ preventScroll: true });
          outputTa.setSelectionRange(offset, endOffset);
        } catch (_) {}
      }

      const gutterUpdaters = {
        input: setupGutter("inputSql", "inputGutter", {
          clickable: true,
          onClick: (line) => jumpToOutputLine(line),
        }),
        output: setupGutter("outputSql", "outputGutter"),
      };

      function refreshGutters() {
        if (gutterUpdaters.input) gutterUpdaters.input();
        if (gutterUpdaters.output) gutterUpdaters.output();
      }

      // 붙여넣기 시 textarea가 맨 아래로 점프하는 동작 방지 (커서/스크롤을 맨 위로)
      function keepScrollOnPaste(textareaId) {
        const ta = el(textareaId);
        if (!ta) return;
        ta.addEventListener("paste", () => {
          requestAnimationFrame(() => {
            ta.scrollTop = 0;
            try {
              ta.setSelectionRange(0, 0);
            } catch (_) {}
          });
        });
      }
      keepScrollOnPaste("inputSql");
      keepScrollOnPaste("outputSql");

      // TOP 버튼: 페이지를 스크롤 했을 때 보이고, 클릭하면 맨 위로
      (function initTopButton() {
        const btn = el("topBtn");
        if (!btn) return;

        function update() {
          if (window.scrollY > 240) btn.classList.add("visible");
          else btn.classList.remove("visible");
        }

        window.addEventListener("scroll", update, { passive: true });
        update();

        btn.addEventListener("click", () => {
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      })();

      function formatNow() {
        const input = el("inputSql").value;
        let output;
        try {
          output = prettifySql(input, getOptions());
        } catch (e) {
          console.error("prettifySql error:", e);
          setStatus(
            "포맷 중 오류가 발생했습니다: " +
              (e && e.message ? e.message : String(e)),
          );
          return;
        }
        el("outputSql").value = output;
        setStatus(
          output
            ? `포맷 완료\n라인 수: ${output.split("\n").length}`
            : "입력된 SQL이 없습니다.",
        );
        try {
          renderDiff(input, output);
          refreshGutters();
        } catch (e) {
          console.error("post-format UI error:", e);
        }
      }

      el("formatBtn").addEventListener("click", formatNow);
      el("copyBtn").addEventListener("click", async () => {
        const value = el("outputSql").value;
        if (!value) return setStatus("복사할 결과가 없습니다.");
        try {
          await navigator.clipboard.writeText(value);
          setStatus("결과를 클립보드에 복사했습니다.");
        } catch {
          setStatus("브라우저가 클립보드 복사를 허용하지 않았습니다.");
        }
      });

      el("swapBtn").addEventListener("click", () => {
        el("inputSql").value = el("outputSql").value;
        setStatus("결과를 입력 영역으로 옮겼습니다.");
        refreshGutters();
      });

      const sample = `CREATE PROCEDURE YLW_SASServiceCloseRemarkMailSend
     @Today   VARCHAR(8) = NULL,
     @DateFr  VARCHAR(8) = NULL
 AS
BEGIN
    SET NOCOUNT ON;
    SET XACT_ABORT ON;
    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    SET @Today  = ISNULL(@Today, CONVERT(VARCHAR(8), GETDATE(), 112));
    SET @DateFr = ISNULL(@DateFr, CONVERT(VARCHAR(8), DATEADD(DAY, -10, CONVERT(DATE, @Today, 112)), 112));

    SELECT @Body = STRING_AGG(CAST('<tr>' + '<td>' + A.CreateDate + '</td>' AS NVARCHAR(MAX)), N'')
      FROM YLW_TASServiceDailyClose A WITH(NOLOCK)
     WHERE NotClose <> 1 AND Remark = N''
       AND CreateDate <= @Today
       AND CreateDate >= @DateFr;

    EXEC msdb.dbo.sp_send_dbmail @profile_name = 'YLW정보보안팀', @recipients = @PslEmail, @copy_recipients = @CopyRecipients, @body = @Body;
END`;

      if (el("sampleBtn")) {
        el("sampleBtn").addEventListener("click", () => {
          el("inputSql").value = sample;
          setStatus("예제를 넣었습니다.");
        });
      }

      if (el("pasteSampleMessy")) {
        el("pasteSampleMessy").addEventListener("click", () => {
          el("inputSql").value = sample;
          formatNow();
        });
      }

      function setCheckedIfExists(id, value) {
        const target = el(id);
        if (target) target.checked = value;
      }

      (function initThemeToggle() {
        const STORAGE_KEY = "theme-preference";
        const root = document.documentElement;
        const buttons = document.querySelectorAll(
          "#themeToggle button[data-theme-value]",
        );

        function getCurrent() {
          try {
            return localStorage.getItem(STORAGE_KEY) || "system";
          } catch (_) {
            return "system";
          }
        }

        function apply(value) {
          try {
            if (value === "system") {
              root.removeAttribute("data-theme");
              localStorage.removeItem(STORAGE_KEY);
            } else {
              root.setAttribute("data-theme", value);
              localStorage.setItem(STORAGE_KEY, value);
            }
          } catch (_) {}
          refresh();
        }

        function refresh() {
          const current = getCurrent();
          buttons.forEach((btn) => {
            btn.setAttribute(
              "aria-pressed",
              btn.dataset.themeValue === current ? "true" : "false",
            );
          });
        }

        buttons.forEach((btn) => {
          btn.addEventListener("click", () => apply(btn.dataset.themeValue));
        });

        refresh();
      })();

      el("resetBtn").addEventListener("click", () => {
        el("indentSize").value = 2;
        el("keywordCase").value = "upper";
        setCheckedIfExists("alignDeclare", true);
        setCheckedIfExists("alignProcParams", true);
        setCheckedIfExists("alignSelectList", true);
        setCheckedIfExists("alignSetClause", true);
        setCheckedIfExists("breakBeforeComma", true);
        setCheckedIfExists("newlineBeforeJoin", true);
        setCheckedIfExists("newlineBeforeAnd", true);
        setCheckedIfExists("spaceAroundOperator", true);
        el("inputSql").value = "";
        el("outputSql").value = "";
        setStatus("초기화했습니다.");
        refreshGutters();
        const diffCard = el("diffCard");
        if (diffCard) diffCard.hidden = true;
      });
    </script>
  </body>
